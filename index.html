<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCOUT PRO - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa2JL7SUc.woff2" rel="stylesheet">
    <script defer src="portada.js"></script>
</head>
<body class="page-portada">

<div class="login-wrapper">
    <div class="login-card">

        <img src="logo_nobg.png" alt="SCOUT PRO" class="login-logo">
        <div class="login-brand">Scout Pro 360°</div>

        <h1 class="login-titulo" id="authTitulo">Iniciar Sesión</h1>
        <p class="login-subtitulo" id="authSubtitulo">Por favor ingresa tus credenciales</p>

        <p class="login-mensaje" id="authMensaje" hidden></p>

        <form id="authForm">
            <div class="login-campo">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tucorreo@ejemplo.com" autocomplete="email">
            </div>

            <div class="login-campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <div class="login-olvide" id="bloqueOlvidePassword">
                <a href="#" id="linkOlvidePassword">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn" id="btnAuth">Entrar</button>
        </form>

        <hr class="login-divisor">

        <p class="login-registro" id="textoAlternarModo">
            ¿No tienes cuenta? <a href="#" id="linkAlternarModo">Créate una</a>
        </p>

    </div>
</div>

</body>
</html>
