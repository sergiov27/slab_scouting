<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css">

<body class="page-radar_chart has-sidebar">

<header class="navbar">

    <button id="btnToggleSidebar"
            class="sidebar-toggle"
            aria-label="Toggle sidebar">
        ☰
    </button>

    <div class="logo">
        <img src="logo_nobg.png" alt="Logo" class="logo-img">
        <span class="nav-text">SCOUTING DATA DRIVEN FPF</span>
    </div>

    <nav>
        <a href="index.html"><span class="nav-text">General</span></a></b>
        <a href="scatterplot.html"><span class="nav-text">Análisis Comparativo</span></a>

        <a href="ficha_individual.html"><span class="nav-text">Ficha Individual</span></a>
    </nav>

</header>

<div class="radar-section">

    <h3 class="titulo-comparador">Comparador de Jugadores</h3>

        <div class="comparador-layout">
            <div class="barra-radar">
                <h3 class="titulo-filtros-radar">Seleccionar Jugadores</h3>
                <div class="filtro-radar-box">
                    <label>Jugador 1</label>
                    <select id="jugador1"></select>
                </div>

                <div class="filtro-radar-box">
                    <label>Jugador 2</label>
                    <select id="jugador2"></select>
                </div>
            </div>

        <div class="contenedor-radares">
            <div class="radar-box">
                <div class="titulo-radar">Perfil Ofensivo</div>
                <canvas id="radarChart"></canvas>
            </div>

            <div class="radar-box">
                <div class="titulo-radar">Perfil Defensivo</div>
                <canvas id="radarDefensivo"></canvas>
            </div>

            <div class="radar-box">
                <div class="titulo-radar">Perfil Creativo</div>
                <canvas id="radarCreacion"></canvas>
            </div>
        </div>

    </div>
    <p class="nota-radares">Las metricas mostradas corresponden a acciones exitosas (p. ej., pases progresivos completados, regates exitosos).</p>
</div>
